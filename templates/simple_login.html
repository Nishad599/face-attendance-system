<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CDAC Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        body {
            padding-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-page);
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo i {
            font-size: 2.5rem;
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .login-logo h1 {
            font-size: 1.43rem;
            margin: 0;
        }

        .login-logo p {
            font-size: 0.93rem;
            color: var(--text-secondary);
            margin: 4px 0 0;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-md);
        }

        .role-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .role-toggle label {
            flex: 1;
            text-align: center;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.93rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .role-toggle input {
            display: none;
        }

        .role-toggle input:checked+label {
            border-color: var(--color-primary);
            background: #DEEBFF;
            color: var(--color-primary);
            font-weight: 600;
        }

        .login-error {
            background: #FFEBE6;
            color: #BF2600;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.93rem;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <i class="fa-solid fa-users-viewfinder"></i>
            <h1>CDAC Attendance</h1>
            <p>Face Recognition System</p>
        </div>

        <div class="login-card">
            <form id="loginForm">
                <div class="role-toggle">
                    <input type="radio" name="role" value="user" id="role-user" checked>
                    <label for="role-user"><i class="fa-solid fa-user"></i> User</label>
                    <input type="radio" name="role" value="admin" id="role-admin">
                    <label for="role-admin"><i class="fa-solid fa-shield-halved"></i> Admin</label>
                </div>

                <div class="app-form-group">
                    <label class="app-form-label">Username</label>
                    <input type="text" name="username" class="app-form-input" placeholder="Enter username"
                        autocomplete="username" required>
                </div>

                <div class="app-form-group">
                    <label class="app-form-label">Password</label>
                    <input type="password" name="password" class="app-form-input" placeholder="Enter password"
                        autocomplete="current-password" required>
                </div>

                <div id="loginError" class="login-error"></div>

                <button type="submit" class="app-btn app-btn-primary app-btn-lg app-btn-block">
                    Log In
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = this.username.value;
            const password = this.password.value;
            let role = this.elements['role'].value;

            if (username.toLowerCase() === 'admin') role = 'admin';

            const errorDiv = document.getElementById('loginError');
            const btn = this.querySelector('button[type="submit"]');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="app-spinner"></span> Logging in...';

            const endpoint = role === 'admin' ? '/api/admin-login' : '/api/user-login';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Success!';
                    btn.classList.remove('app-btn-primary');
                    btn.classList.add('app-btn-success');
                    setTimeout(() => {
                        window.location.href = data.redirect_url || (role === 'admin' ? '/dashboard' : '/user/home');
                    }, 400);
                } else {
                    errorDiv.textContent = data.message || 'Invalid credentials';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'Log In';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection failed. Please try again.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Log In';
            }
        });
    </script>
</body>

</html>
