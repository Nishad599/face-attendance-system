<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students — CDAC Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="app-navbar">
        <a href="/dashboard" class="app-navbar-brand">
            <i class="fa-solid fa-users-viewfinder"></i>
            CDAC Attendance
        </a>
        <div class="app-navbar-links">
            <a href="/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="/attendance"><i class="fa-solid fa-camera"></i> Attendance</a>
            <a href="/students" class="active"><i class="fa-solid fa-users"></i> Students</a>
            <a href="/attendance-management"><i class="fa-solid fa-table-list"></i> Reports</a>
            <a href="/about"><i class="fa-solid fa-circle-info"></i> About</a>
        </div>
        <div class="app-navbar-actions">
            <button class="app-btn app-btn-subtle app-btn-sm" onclick="performLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <div class="app-page">
        <div class="app-breadcrumb"><a href="/dashboard">Dashboard</a> / Manage Students</div>
<!-- Header (About Us style) -->
    
    
        
    </div>


    <div class="header">
        <h1><i class="fa-solid fa-clipboard-user"></i> Student Management</h1>
        <p>Manage registered students and their information</p>
    </div>

    

    <div class="container">
        <div class="students-section">
            <div class="section-header">
                <h2><i class="fa-solid fa-users"></i> Registered Students</h2>
                <button class="btn btn-success" onclick="refreshStudents()"><i class="fa-solid fa-arrows-rotate"></i> Refresh</button>
            </div>

            <div id="studentsContainer">
                <div class="loading">Loading students...</div>
            </div>
        </div>
    </div>

    <!-- Edit Student Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Edit Student</h3>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editName">Name:</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label for="editEmail">Email:</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label for="editStudentId">Student ID:</label>
                    <input type="text" id="editStudentId" required>
                </div>
                <div class="form-group">
                    <label for="editJoiningDate">Joining Date:</label>
                    <input type="date" id="editJoiningDate" required>
                </div>
                <div style="text-align: right;">
                    <button type="button" class="btn btn-primary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-success">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentEditId = null;

        async function refreshStudents() {
            try {
                const response = await fetch('/api/students/list');
                const data = await response.json();

                if (!data.success) {
                    document.getElementById('studentsContainer').innerHTML =
                        `<div class="status error"><i class="fa-solid fa-xmark text-red-500"></i> Error loading students: ${data.message}</div>`;
                    return;
                }

                if (data.students.length === 0) {
                    document.getElementById('studentsContainer').innerHTML =
                        '<div class="status">No students registered yet. <a href="/register">Register the first student</a></div>';
                    return;
                }

                // Keep last loaded for editing
                window.lastLoadedStudents = data.students;

                let tableHTML = `
                    <div class="search-controls">
                        <input type="text" id="studentSearch" class="search-input"
                               placeholder="Search by name, email, or student ID...">
                        <span>Found: <span id="studentCount">0</span> students</span>
                    </div>
                    <div class="students-table-container">
                        <table class="students-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Student ID</th>
                                    <th>Email</th>
                                    <th>Joining Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                data.students.forEach(student => {
                    tableHTML += `
                        <tr>
                            <td>${student.name}</td>
                            <td>${student.student_id}</td>
                            <td>${student.email}</td>
                            <td>${student.joining_date}</td>
                            <td>
                                <button class="btn btn-warning" onclick="editStudent(${student.id})">
                                    ✏️ Edit
                                </button>
                                <button class="btn btn-danger" onclick="deleteStudent(${student.id}, '${student.name.replace(/'/g,"\\'")}')">
                                    🗑️ Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table></div>`;
                document.getElementById('studentsContainer').innerHTML = tableHTML;

            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('studentsContainer').innerHTML =
                    `<div class="status error"><i class="fa-solid fa-xmark text-red-500"></i> Error loading students: ${error.message}</div>`;
            }
        }

        function editStudent(id) {
            const student = window.lastLoadedStudents && window.lastLoadedStudents.find(s => s.id === id);
            if (!student) return;
            currentEditId = id;
            document.getElementById('editName').value = student.name;
            document.getElementById('editEmail').value = student.email;
            document.getElementById('editStudentId').value = student.student_id;
            document.getElementById('editJoiningDate').value = student.joining_date;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditId = null;
        }

        async function deleteStudent(studentId, studentName) {
            if (!confirm(`Are you sure you want to delete ${studentName}? This action cannot be undone.`)) return;

            try {
                const response = await fetch(`/api/students/${studentId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();

                if (data.success) {
                    alert(`<i class="fa-solid fa-check text-green-500"></i> ${data.message}`);
                    // FIX: call the existing refresh method (was loadStudents)
                    await refreshStudents();
                    setupStudentSearch();
                } else {
                    alert(`<i class="fa-solid fa-xmark text-red-500"></i> Error: ${data.message}`);
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert(`<i class="fa-solid fa-xmark text-red-500"></i> Failed to delete student: ${error.message}`);
            }
        }

        // Handle edit form submission
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentEditId) return;

            const formData = {
                name: document.getElementById('editName').value.trim(),
                email: document.getElementById('editEmail').value.trim(),
                student_id: document.getElementById('editStudentId').value.trim(),
                joining_date: document.getElementById('editJoiningDate').value
            };

            try {
                const response = await fetch(`/api/students/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();

                if (data.success) {
                    alert(`<i class="fa-solid fa-check text-green-500"></i> ${data.message}`);
                    closeEditModal();
                    await refreshStudents();
                    setupStudentSearch();
                } else {
                    alert(`<i class="fa-solid fa-xmark text-red-500"></i> Error: ${data.message}`);
                }
            } catch (error) {
                alert(`<i class="fa-solid fa-xmark text-red-500"></i> Error updating student: ${error.message}`);
            }
        });

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) closeEditModal();
        }

        // Search functionality
        function setupStudentSearch() {
            const searchInput = document.getElementById('studentSearch');
            if (!searchInput) return;

            const tbody = document.querySelector('.students-table tbody');
            const countEl = document.getElementById('studentCount');
            const updateCount = () => {
                const rows = tbody ? tbody.querySelectorAll('tr') : [];
                let visibleCount = 0;
                rows.forEach(r => { if (r.style.display !== 'none') visibleCount++; });
                if (countEl) countEl.textContent = visibleCount;
            };

            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                const rows = tbody ? tbody.querySelectorAll('tr') : [];
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
                updateCount();
            });

            // Initialize count
            updateCount();
        }

        // Wrap refreshStudents to auto-wire search after render
        const _refreshStudents = refreshStudents;
        refreshStudents = async function() {
            await _refreshStudents();
            setupStudentSearch();
        };

        // Initial load
        refreshStudents();
    </script>

    <script>
        // Logout functionality
        async function performLogout() {
            if (confirm('Are you sure you want to logout?')) {
                try {
                    const response = await fetch('/api/logout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include'
                    });
                    const result = await response.json();

                    if (result.success) {
                        localStorage.clear();
                        sessionStorage.clear();
                        window.location.href = '/login';
                    } else {
                        alert('Logout failed: ' + result.message);
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login';
                }
            }
        }

        // Session checks (optional but kept from your pattern)
        async function checkSession() {
            try {
                const response = await fetch('/api/session/status', { credentials: 'include' });
                const result = await response.json();
                if (!result.authenticated) window.location.href = '/login';
            } catch (error) {
                console.log('Session check failed:', error);
            }
        }
        setInterval(checkSession, 5 * 60 * 1000);
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) checkSession();
        });
    </script>
    </div>

</body>
</html>
